# fly.toml

app = "reminiscence-spring-boot"
primary_region = "bom"

[build]

[http_service]
  internal_port = 8080
  force_https = true

  # Start machine automatically when traffic arrives
  auto_start_machines = true

  # Stop machine when idle (saves credits)
  auto_stop_machines = "stop"

  # No always-on machine
  min_machines_running = 0

  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 200

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
