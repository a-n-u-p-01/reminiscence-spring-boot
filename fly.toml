# fly.toml app configuration file generated for reminiscence-spring-boot on 2026-06-01T09:04:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "reminiscence-spring-boot"
primary_region = "bom"

[build]

[http_service]
  internal_port = 8080
  force_https = true

  auto_start_machines = true
  auto_stop_machines = false
  min_machines_running = 1

  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory = '1gb'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory = '1gb'
  memory_mb = 1024
  processes = ['app']
  size = 'shared-cpu-1x'
